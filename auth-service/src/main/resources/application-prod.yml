spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    org.springframework.security: INFO
    com.shortener: INFO

frontend:
  url: ${FRONTEND_URL}

management:
  endpoints:
    web:
      exposure:
        include: health, info

app:
  cookie:
    secure: true
    domain: .linxlytics.com
    same-site: None

server:
  forward-headers-strategy: framework