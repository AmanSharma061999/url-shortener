spring:
  application:
    name: link-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5439/url_shortener}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${PORT:8082}


management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: ${spring.application.name }

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [traceId=%X{traceId:-}] %logger{36} - %msg%n"



auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8081}

analytics:
  service:
    url: ${ANALYTICS_SERVICE_URL:http://localhost:8083}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:172800000}