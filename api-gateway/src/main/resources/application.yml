server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**

        - id: link-service
          uri: http://link-service:8082
          predicates:
            - Path=/api/urls/**,/s/**

        - id: analytics-service
          uri: http://analytics-service:8083
          predicates:
            - Path=/api/analytics/**

management:
  endpoints:
    web:
      exposure:
        include: health,info

