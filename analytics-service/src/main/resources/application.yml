spring:
  application:
    name: analytics-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5439/url_shortener}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  jwt:
    secret: ${JWT_SECRET:6dbe489bffa6017efc738299d819674560bf5c84f6b5fb667c4842a732e1baf2d77c524d6fbd02f23b19550262bdd6949c3d3fb49a2dd414b4f17b1d8aaab5d4}
    expiration: ${JWT_EXPIRATION:172800000}

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${PORT:8083}


management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [traceId=%X{traceId:-}] %logger{36} - %msg%n"