spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5439/url_shortener}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:6521}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration


logging:
  level:
    org.flywaydb: INFO
    org.springframework.security: INFO
    org.springframework.web: DEBUG
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    com.shortener.analytics: DEBUG


frontend:
  url: ${FRONTEND_URL:http://localhost:5173}

jwt:
  secret: ${JWT_SECRET:6dbe489bffa6017efc738299d819674560bf5c84f6b5fb667c4842a732e1baf2d77c524d6fbd02f23b19550262bdd6949c3d3fb49a2dd414b4f17b1d8aaab5d4}
  expiration: ${JWT_EXPIRATION:172800000}

management:
  endpoints:
    web:
      exposure:
        include: health, info

app:
  cookie:
    secure: ${APP_COOKIE_SECURE:false}


server:
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param


