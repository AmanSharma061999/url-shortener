name: url_shortener

services:
  postgres:
    image: postgres:16
    container_name: urlshortener-db
    ports:
      - "5439:5432"
    env_file: [ .env ]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  auth-service:
    build: ./auth-service
    container_name: auth-service
    env_file: [ .env ]
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      PORT: 8081

      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}

      FRONTEND_URL: ${FRONTEND_URL}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      APP_COOKIE_SECURE: ${APP_COOKIE_SECURE}

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health | grep UP || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  link-service:
    build: ./link-service
    container_name: link-service
    env_file: [ .env ]
    ports:
      - "8082:8082"

    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      analytics-service:
        condition: service_started

    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      PORT: 8082

      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}

      AUTH_SERVICE_URL: http://auth-service:8081
      ANALYTICS_SERVICE_URL: http://analytics-service:8083

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health | grep UP || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  analytics-service:
    build: ./analytics-service
    container_name: analytics-service
    env_file: [ .env ]
    ports:
      - "8083:8083"

    depends_on:
      postgres:
        condition: service_healthy

    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      PORT: 8083

      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/actuator/health | grep UP || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    depends_on:
      - auth-service
      - link-service
      - analytics-service
    ports:
      - "8080:8080"
volumes:
  pgdata:







